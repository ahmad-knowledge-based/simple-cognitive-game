name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Izin minimum yang dibutuhkan untuk deploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya satu deploy berjalan dalam satu waktu
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Situs adalah satu file index.html mandiri di root repo
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
